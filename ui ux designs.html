    <style>
            .loader-container{
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    background-color: rgb(0, 0, 0);
                    height: 100vh;
                    width: 100%;
                    position: fixed;
                    z-index: 2000;
                }
                .loader,
            .loader:before,
            .loader:after {
            background: #670d0d;
            -webkit-animation: load1 1s infinite ease-in-out;
            animation: load1 1s infinite ease-in-out;
            width: 1em;
            height: 4em;
            }
            .loader {
            color: #670d0d;
            text-indent: -9999em;
            margin: 88px auto;
            position: relative;
            font-size: 15px;
            -webkit-transform: translateZ(0);
            -ms-transform: translateZ(0);
            transform: translateZ(0);
            -webkit-animation-delay: -0.16s;
            animation-delay: -0.16s;
            }
            .loader:before,
            .loader:after {
            position: absolute;
            top: 0;
            content: '';
            }
            .loader:before {
            left: -1.5em;
            -webkit-animation-delay: -0.32s;
            animation-delay: -0.32s;
            }
            .loader:after {
            left: 1.5em;
            }
            @-webkit-keyframes load1 {
            0%,
            80%,
            100% {
                box-shadow: 0 0;
                height: 4em;
            }
            40% {
                box-shadow: 0 -2em;
                height: 5em;
            }
            }
            @keyframes load1 {
            0%,
            80%,
            100% {
                box-shadow: 0 0;
                height: 4em;
            }
            40% {
                box-shadow: 0 -2em;
                height: 5em;
            }
            }
            p{
                overflow: hidden;
            }
            .imgg{
                display: block;
                height: 180px;
            }
            
            .xx{
                position: relative;
                top: 140px;
            }
    </style>

    <script>
        function dark() {
            document.querySelector('body').classList.add('dark-mode');
            document.querySelector('body').classList.remove('neon-mode');
            localStorage.setItem("data-theme", "dark");
        }
        function neon() {
            document.querySelector('body').classList.add('neon-mode');
            document.querySelector('body').classList.remove('dark-mode');
            localStorage.setItem("data-theme", "neon");
        }
               
                window.onload= function() {
                    let theme_flag=localStorage.getItem("data-theme");
                    if(theme_flag=="dark"){
                        dark();
                    }else if(theme_flag == "neon"){
                        neon();
                    }
                }
